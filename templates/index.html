<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ADPOLY Blackboard - Learning Management System">
    <title>ADPOLY Blackboard - Learning Management System</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/exam.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
    <div id="app-container">
        <!-- Navigation - hidden on auth pages -->
        <nav id="main-nav" class="hidden">
            <div class="nav-brand">
                <div class="nav-logo">
                    <img src="/static/images/adpoly-logo.png" alt="ADPOLY" style="height:36px; width:auto;">
                </div>
                <span class="nav-title">Blackboard</span>
            </div>
            <div class="nav-search">
                <input type="text" id="global-search" placeholder="Search courses, assignments..." autocomplete="off">
            </div>
            <div class="nav-actions">
                <button id="btn-notifications" class="nav-icon-btn" title="Notifications">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span id="notification-badge" class="badge hidden">0</span>
                </button>
                <button id="btn-messages-nav" class="nav-icon-btn" title="Messages">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span id="message-badge" class="badge hidden">0</span>
                </button>
                <button id="btn-theme" class="nav-icon-btn" title="Toggle theme">
                    <svg id="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="icon-moon" class="hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div id="user-menu" class="user-menu">
                    <button id="btn-user-menu" class="user-avatar-btn">
                        <div class="avatar" id="nav-avatar">U</div>
                        <span id="nav-user-name">User</span>
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div id="user-dropdown" class="dropdown hidden">
                        <a href="#/profile" class="dropdown-item">Profile Settings</a>
                        <a href="#/security" class="dropdown-item">Security & MFA</a>
                        <hr>
                        <a href="#" id="btn-logout" class="dropdown-item text-danger">Sign Out</a>
                    </div>
                </div>
            </div>
        </nav>

        <div id="app-body" class="hidden">
            <!-- Sidebar -->
            <aside id="sidebar">
                <div id="sidebar-menu"></div>
            </aside>

            <!-- Main Content -->
            <main id="main-content">
                <div id="page-content"></div>
            </main>
        </div>

        <!-- Auth Container (login/register) -->
        <div id="auth-container"></div>
    </div>

    <!-- Notification Panel -->
    <div id="notification-panel" class="slide-panel hidden">
        <div class="panel-header">
            <h3>Notifications</h3>
            <button id="btn-close-notifications" class="btn-icon">&times;</button>
        </div>
        <div id="notification-list" class="panel-body"></div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-container" class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button id="modal-close" class="btn-icon">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav id="mobile-nav" class="hidden">
        <a href="#/dashboard" class="mobile-nav-item" data-page="dashboard">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
            <span>Home</span>
        </a>
        <a href="#/courses" class="mobile-nav-item" data-page="courses">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>Courses</span>
        </a>
        <a href="#/messages" class="mobile-nav-item" data-page="messages">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span>Messages</span>
        </a>
        <a href="#/grades" class="mobile-nav-item" data-page="grades">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Grades</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/courses.js"></script>
    <script src="/static/js/materials.js"></script>
    <script src="/static/js/assignments.js"></script>
    <script src="/static/js/exams.js"></script>
    <script src="/static/js/proctor.js"></script>
    <script src="/static/js/messages.js"></script>
    <script src="/static/js/forums.js"></script>
    <script src="/static/js/grades.js"></script>
    <script src="/static/js/attendance.js"></script>
    <script src="/static/js/caf.js"></script>
    <script src="/static/js/teams.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
